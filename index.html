<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Portfolio | Cinematic Resume</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-950 text-white overflow-x-hidden">

    <!-- Background Ambient Glows -->
    <div class="fixed top-[-10%] left-[-10%] w-[40%] h-[40%] bg-blue-900/20 blur-[120px] rounded-full -z-10"></div>
    <div class="fixed bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-purple-900/20 blur-[120px] rounded-full -z-10"></div>

    <!-- Hero Section -->
    <section class="min-h-screen flex flex-col items-center justify-center relative px-4 text-center">
        <div id="hero-content" class="opacity-0 translate-y-10">
            <div class="relative inline-block mb-8">
                <img id="profile-img" src="https://via.placeholder.com/150" alt="Profile" class="w-40 h-40 rounded-full border-4 border-blue-500/50 shadow-[0_0_30px_rgba(59,130,246,0.5)] object-cover">
                <div class="absolute -bottom-2 -right-2 bg-blue-600 p-2 rounded-full border-2 border-slate-950">
                    <i class="fas fa-check-circle text-xs"></i>
                </div>
            </div>
            <h1 id="full-name" class="text-5xl md:text-7xl font-extrabold mb-4 tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-purple-500">
                Loading...
            </h1>
            <p id="professional-title" class="text-xl md:text-2xl text-slate-400 font-light mb-8">
                Please wait while we fetch data...
            </p>
            <a href="#about" class="px-8 py-3 bg-blue-600 hover:bg-blue-500 transition-all rounded-full font-medium shadow-lg shadow-blue-600/30">
                Explore My Work <i class="fas fa-arrow-down ml-2"></i>
            </a>
        </div>
    </section>

    <!-- About Section -->
    <section id="about" class="py-24 px-4 max-w-5xl mx-auto">
        <div class="glass-panel p-8 md:p-12 rounded-3xl border border-white/10 reveal">
            <h2 class="text-3xl font-bold mb-6 flex items-center gap-3">
                <i class="fas fa-user text-blue-500"></i> About Me
            </h2>
            <p id="introduction" class="text-lg text-slate-300 leading-relaxed mb-6">
                Fetching introduction...
            </p>
            <p id="about-me" class="text-lg text-slate-300 leading-relaxed">
                Fetching details...
            </p>
        </div>
    </section>

    <!-- Documents Section -->
    <section class="py-24 px-4 max-w-6xl mx-auto">
        <h2 class="text-3xl font-bold mb-12 text-center reveal">
            <span class="bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-purple-500">Portfolio & Documents</span>
        </h2>
        <div id="docs-grid" class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <!-- Docs will be injected here -->
        </div>
    </section>

    <!-- Contact Section -->
    <section class="py-24 px-4 text-center max-w-3xl mx-auto">
        <div class="glass-panel p-12 rounded-3xl border border-white/10 reveal">
            <h2 class="text-3xl font-bold mb-6">Get In Touch</h2>
            <p id="contact-info" class="text-xl text-slate-400 mb-8">
                Fetching contact info...
            </p>
            <div class="flex justify-center gap-6 text-2xl">
                <a href="#" class="hover:text-blue-400 transition-colors"><i class="fab fa-linkedin"></i></a>
                <a href="#" class="hover:text-blue-400 transition-colors"><i class="fab fa-github"></i></a>
                <a href="#" class="hover:text-blue-400 transition-colors"><i class="fas fa-envelope"></i></a>
            </div>
        </div>
    </section>

    <!-- File Viewer Modal -->
    <div id="viewer-modal" class="fixed inset-0 z-50 hidden flex items-center justify-center p-4 bg-slate-950/90 backdrop-blur-md">
        <div class="relative w-full max-w-5xl h-full max-h-[90vh] glass-panel rounded-3xl overflow-hidden flex flex-col">
            <div class="p-4 border-b border-white/10 flex justify-between items-center">
                <span id="modal-title" class="font-medium">Document Viewer</span>
                <button id="close-modal" class="p-2 hover:bg-white/10 rounded-full transition-all">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="flex-1 overflow-auto p-4 flex justify-center items-center">
                <div id="modal-content" class="w-full h-full"></div>
            </div>
        </div>
    </div>

    <script src="viewer.js"></script>
</body>
</html>
