<!DOCTYPE html>
<html>
<head>
    <title>Admin Login</title>
    <style>
        body { margin: 0; padding: 0; font-family: Arial; background: linear-gradient(135deg, #1a1a2e, #16213e); height: 100vh; display: flex; align-items: center; justify-content: center; }
        .box { background: white; padding: 40px; border-radius: 15px; width: 300px; text-align: center; }
        h2 { color: #333; margin-bottom: 20px; }
        input { width: 100%; padding: 15px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 15px; background: #3b82f6; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; }
        button:hover { background: #2563eb; }
        #msg { color: red; display: none; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Admin Login</h2>
        <input type="password" id="pwd" placeholder="Enter Password">
        <button onclick="login()">Login</button>
        <div id="msg">Incorrect password</div>
    </div>

    <script>
        function login() {
            var pwd = document.getElementById('pwd').value;
            if (pwd === 'admin123') {
                localStorage.setItem('admin_logged_in', 'true');
                window.location.href = 'admin-dashboard.html';
            } else {
                document.getElementById('msg').style.display = 'block';
            }
        }
    </script>
</body>
</html>
