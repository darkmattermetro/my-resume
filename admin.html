<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Metro Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="bg-[#0a0a0f] text-white min-h-screen font-['Outfit']">

    <!-- Login Overlay -->
    <div id="login-overlay" class="fixed inset-0 z-[100] bg-[#0a0a0f] flex items-center justify-center px-4">
        <div class="absolute inset-0 bg-gradient-to-br from-red-600/20 via-transparent to-red-600/20 -z-10"></div>
        
        <div class="w-full max-w-md">
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-red-600 rounded-2xl flex items-center justify-center mx-auto mb-4">
                    <i class="fas fa-subway text-2xl"></i>
                </div>
                <h2 class="text-2xl font-bold">Admin Access</h2>
                <p class="text-slate-500 mt-2">Enter your credentials to manage portfolio</p>
            </div>
            
            <div class="glass-panel p-8 rounded-2xl border border-white/10">
                <input type="password" id="admin-pass" placeholder="Enter Admin Password" class="w-full p-4 bg-white/5 border border-white/10 rounded-xl mb-4 outline-none focus:border-red-500 focus:ring-1 focus:ring-red-500 transition-all text-center">
                <button id="login-btn" class="w-full py-4 bg-red-600 hover:bg-red-500 rounded-xl font-bold transition-all">
                    Unlock Dashboard
                </button>
                <p id="login-error" class="text-red-400 mt-4 hidden text-center text-sm">Incorrect password. Please try again.</p>
            </div>
        </div>
    </div>

    <!-- Main Admin Content -->
    <div id="admin-content" class="hidden">
        <!-- Admin Header -->
        <header class="bg-[#0a0a0f]/80 backdrop-blur-xl border-b border-white/5 sticky top-0 z-50">
            <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-red-600 rounded-lg flex items-center justify-center">
                        <i class="fas fa-subway text-white"></i>
                    </div>
                    <span class="font-bold text-xl">ADMIN<span class="text-red-500">PANEL</span></span>
                </div>
                <button id="logout-btn" class="px-4 py-2 bg-white/5 hover:bg-red-600 border border-white/10 hover:border-red-600 rounded-lg transition-all flex items-center gap-2">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </button>
            </div>
        </header>

        <!-- Admin Dashboard -->
        <main class="max-w-6xl mx-auto px-6 py-12">
            
            <!-- Profile Editor -->
            <div class="glass-panel p-8 rounded-2xl border border-white/10 mb-8">
                <div class="flex items-center gap-3 mb-6">
                    <div class="w-10 h-10 bg-red-600/20 rounded-lg flex items-center justify-center">
                        <i class="fas fa-user-edit text-red-500"></i>
                    </div>
                    <div>
                        <h2 class="text-xl font-bold">Profile Information</h2>
                        <p class="text-sm text-slate-500">Update your personal and professional details</p>
                    </div>
                </div>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="flex flex-col gap-2">
                        <label class="text-sm text-slate-400">Full Name</label>
                        <input type="text" id="input-full-name" class="p-4 bg-white/5 border border-white/10 rounded-xl outline-none focus:border-red-500 focus:ring-1 focus:ring-red-500 transition-all">
                    </div>
                    <div class="flex flex-col gap-2">
                        <label class="text-sm text-slate-400">Professional Title</label>
                        <input type="text" id="input-title" class="p-4 bg-white/5 border border-white/10 rounded-xl outline-none focus:border-red-500 focus:ring-1 focus:ring-red-500 transition-all">
                    </div>
                    <div class="flex flex-col gap-2 md:col-span-2">
                        <label class="text-sm text-slate-400">Short Introduction</label>
                        <textarea id="input-intro" rows="2" class="p-4 bg-white/5 border border-white/10 rounded-xl outline-none focus:border-red-500 focus:ring-1 focus:ring-red-500 transition-all"></textarea>
                    </div>
                    <div class="flex flex-col gap-2 md:col-span-2">
                        <label class="text-sm text-slate-400">About Me (Full Bio)</label>
                        <textarea id="input-about" rows="4" class="p-4 bg-white/5 border border-white/10 rounded-xl outline-none focus:border-red-500 focus:ring-1 focus:ring-red-500 transition-all"></textarea>
                    </div>
                    <div class="flex flex-col gap-2 md:col-span-2">
                        <label class="text-sm text-slate-400">Contact Information</label>
                        <input type="text" id="input-contact" class="p-4 bg-white/5 border border-white/10 rounded-xl outline-none focus:border-red-500 focus:ring-1 focus:ring-red-500 transition-all">
                    </div>
                </div>
                
                <button id="save-profile-btn" class="mt-8 px-8 py-4 bg-red-600 hover:bg-red-500 rounded-xl font-bold transition-all flex items-center gap-2">
                    <i class="fas fa-save"></i> Save Changes
                </button>
            </div>

            <!-- Media & Documents -->
            <div class="glass-panel p-8 rounded-2xl border border-white/10">
                <div class="flex items-center gap-3 mb-6">
                    <div class="w-10 h-10 bg-red-600/20 rounded-lg flex items-center justify-center">
                        <i class="fas fa-cloud-upload-alt text-red-500"></i>
                    </div>
                    <div>
                        <h2 class="text-xl font-bold">Media & Documents</h2>
                        <p class="text-sm text-slate-500">Upload your profile photo and portfolio documents</p>
                    </div>
                </div>
                
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                    <!-- Profile Photo -->
                    <div class="p-6 border border-white/5 rounded-2xl bg-white/[0.02]">
                        <h3 class="font-bold mb-4 flex items-center gap-2">
                            <i class="fas fa-camera text-red-500"></i> Profile Photo
                        </h3>
                        <div class="flex items-center gap-6">
                            <img id="current-photo" src="https://via.placeholder.com/120" class="w-24 h-24 rounded-2xl object-cover border-2 border-red-500/50">
                            <label class="cursor-pointer px-6 py-3 bg-red-600 hover:bg-red-500 rounded-xl font-medium transition-all">
                                <i class="fas fa-upload mr-2"></i> Upload New
                                <input type="file" id="photo-upload" accept="image/*" class="hidden">
                            </label>
                        </div>
                    </div>

                    <!-- Document Upload -->
                    <div class="p-6 border border-white/5 rounded-2xl bg-white/[0.02]">
                        <h3 class="font-bold mb-4 flex items-center gap-2">
                            <i class="fas fa-file-pdf text-red-500"></i> Upload Document
                        </h3>
                        <div class="flex flex-col gap-4">
                            <input type="text" id="doc-name" placeholder="Document Name (e.g., Resume 2024)" class="p-4 bg-white/5 border border-white/10 rounded-xl outline-none focus:border-red-500">
                            <input type="file" id="doc-upload" accept="application/pdf,image/*" class="p-4 bg-white/5 border border-white/10 rounded-xl text-sm">
                            <button id="upload-doc-btn" class="py-4 bg-red-600 hover:bg-red-500 rounded-xl font-bold transition-all">
                                <i class="fas fa-cloud-upload-alt mr-2"></i> Upload Document
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Uploaded Documents List -->
                <div class="mt-8">
                    <h3 class="font-bold mb-4 flex items-center gap-2">
                        <i class="fas fa-list text-red-500"></i> Uploaded Documents
                    </h3>
                    <div id="docs-list" class="grid grid-cols-1 md:grid-cols-2 gap-3">
                        <!-- Files will be listed here -->
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="admin.js"></script>
</body>
</html>
